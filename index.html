<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Task Dashboard</title>
<link rel="stylesheet" href="task.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <!-- Side Panel -->
  <aside class="side-panel">
    <h2><i class="fas fa-chart-line"></i> Dashboard</h2>
    <button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i> Dark Mode</button>
    <button id="add-user-btn"><i class="fas fa-user-plus"></i> Add User</button>
    <div class="stats-panel">
      <h3>Statistics</h3>
      <div class="stat-item">
        <span>Total Users:</span>
        <span id="total-users">0</span>
      </div>
      <div class="stat-item">
        <span>Total Tasks:</span>
        <span id="total-tasks">0</span>
      </div>
      <div class="stat-item">
        <span>Completed:</span>
        <span id="completed-tasks">0</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Search and Filter Bar -->
    <div class="filter-bar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Search users or tasks...">
      </div>
      <div class="filter-options">
        <select id="priority-filter">
          <option value="all">All Priorities</option>
          <option value="high">High Priority</option>
          <option value="medium">Medium Priority</option>
          <option value="low">Low Priority</option>
        </select>
        <select id="status-filter">
          <option value="all">All Status</option>
          <option value="completed">Completed</option>
          <option value="in-progress">In Progress</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
    </div>
    
    <div id="dashboard">
      <!-- User cards appear here -->
    </div>
  </main>
</div>

<!-- Modal for Adding User -->
<div class="modal" id="user-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-user-plus"></i> Add User</h3>
      <button class="close-btn" id="close-user-modal">&times;</button>
    </div>
    <input type="text" id="user-name-input" placeholder="Enter user name">
    <button id="create-user-btn"><i class="fas fa-check"></i> Create User</button>
  </div>
</div>

<!-- Modal for Adding Task -->
<div class="modal" id="task-modal">
  <div class="modal-content task-modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-tasks"></i> Add Task</h3>
      <button class="close-btn" id="close-task-modal">&times;</button>
    </div>
    <input type="text" id="task-name-input" placeholder="Task name">
    <select id="task-priority-input">
      <option value="low">Low Priority</option>
      <option value="medium" selected>Medium Priority</option>
      <option value="high">High Priority</option>
    </select>
    <select id="task-category-input">
      <option value="general">General</option>
      <option value="work">Work</option>
      <option value="personal">Personal</option>
      <option value="urgent">Urgent</option>
    </select>
    <input type="date" id="task-deadline-input">
    <input type="number" id="task-progress-input" placeholder="Progress (0-100)" min="0" max="100" value="0">
    <button id="create-task-btn"><i class="fas fa-check"></i> Create Task</button>
  </div>
</div>

<!-- Modal for Editing Task -->
<div class="modal" id="edit-task-modal">
  <div class="modal-content task-modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-edit"></i> Edit Task</h3>
      <button class="close-btn" id="close-edit-task-modal">&times;</button>
    </div>
    <input type="text" id="edit-task-name-input" placeholder="Task name">
    <select id="edit-task-priority-input">
      <option value="low">Low Priority</option>
      <option value="medium">Medium Priority</option>
      <option value="high">High Priority</option>
    </select>
    <select id="edit-task-category-input">
      <option value="general">General</option>
      <option value="work">Work</option>
      <option value="personal">Personal</option>
      <option value="urgent">Urgent</option>
    </select>
    <input type="date" id="edit-task-deadline-input">
    <input type="number" id="edit-task-progress-input" placeholder="Progress (0-100)" min="0" max="100">
    <button id="save-task-btn"><i class="fas fa-save"></i> Save Changes</button>
  </div>
</div>

<script src="task.js"></script>
</body>
</html>
